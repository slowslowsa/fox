name: Test Scraper (Quick)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/uefn-documentation-ny5a0m
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Test Wayback CDX URL discovery
        run: |
          python3 -c "
          from scraper.sitemap import fetch_wayback_urls
          urls = fetch_wayback_urls()
          print(f'RESULT: {len(urls)} URLs found via Wayback CDX')
          for u in urls[:5]:
              print(f'  {u}')
          "

      - name: Smoke test (code + CDX, 60s max)
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          rm -rf docs/uefn/
          rm -f scraper_state.json
          # Epic's CSR docs + GH Actions IP block = 0 pages expected from CI.
          # Real scraping works locally with: python3 scrape.py --local
          timeout 60 python3 scrape.py --limit 3 || true
          COUNT=$(find docs/uefn -name "*.md" 2>/dev/null | wc -l)
          echo "=== Pages written: ${COUNT} ==="
          echo "(0 is normal from CI — Epic blocks data-center IPs; run --local on your PC)"
          find docs/uefn -name "*.md" 2>/dev/null | head -5 | xargs head -10 2>/dev/null || true

      - name: Commit test results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No files to commit."
          else
            COUNT=$(find docs/uefn -name "*.md" 2>/dev/null | wc -l)
            git commit -m "test: quick scraper test (${COUNT} pages)"
            git push
          fi
